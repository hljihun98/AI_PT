<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#050508" />
  <title>AI Personal Trainer Pro</title>
  <link rel="stylesheet" href="style.css" />

  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="app-container">

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="app-logo">
      <div class="logo-icon">🤖</div>
      <div>
        <div class="logo-text">AI PT PRO</div>
        <div class="logo-version">v5.0 · POSE ENGINE</div>
      </div>
    </div>

    <div class="header-status">
      <div class="status-badge">
        <div class="status-dot" id="cameraStatusDot"></div>
        <span id="cameraStatusText">STANDBY</span>
      </div>
      <div class="status-badge">
        <span>FPS</span>
        <span id="fpsCounter" class="text-cyan">--</span>
      </div>
      <div class="status-badge">
        <span>신뢰도</span>
        <span id="poseConfidence" class="text-cyan">--%</span>
      </div>
    </div>

    <nav class="header-nav">
      <button class="nav-btn active" id="btnWorkout" onclick="app?.showWorkout()">운동</button>
      <button class="nav-btn" id="btnDashboard" onclick="app?.showDashboard()">대시보드</button>
    </nav>
  </header>

  <!-- ── Error Banner ── -->
  <div class="error-message hidden" id="errorMessage" style="margin:8px 16px 0;"></div>

  <!-- ── Main ── -->
  <main class="main-content">

    <!-- ═══════════════════════════
         WORKOUT VIEW
    ════════════════════════════ -->
    <div id="workoutView">
      <div class="workout-layout">

        <!-- Camera + Canvas -->
        <div class="camera-section">
          <div class="camera-wrapper">
            <video id="videoElement" playsinline muted></video>
            <canvas id="poseCanvas"></canvas>

            <!-- Overlay corners -->
            <div class="camera-overlay">
              <div class="corner-tr"></div>
              <div class="corner-bl"></div>
            </div>

            <!-- Status text -->
            <div class="camera-status" id="statusMessage">카메라를 시작하려면 "시작" 버튼을 누르세요</div>

            <!-- FPS -->
            <div class="fps-display mono" id="fpsDisplay"></div>

            <!-- Feedback messages -->
            <div class="feedback-container" id="feedbackContainer"></div>

            <!-- Camera Controls (in-camera) -->
            <div class="camera-controls">
              <button class="icon-btn active" id="btnSkeleton" title="스켈레톤 표시" onclick="app?.toggleSkeleton()">🦴</button>
              <button class="icon-btn" id="btnAngles" title="각도 표시" onclick="app?.state && (app.state.showAngles = !app.state.showAngles); this.classList.toggle('active')">📐</button>
              <button class="icon-btn" id="btnCameraFlip" title="카메라 전환" onclick="app?.flipCamera()">🔄</button>
              <button class="icon-btn" id="btnVoice" title="음성 피드백" onclick="app?.toggleVoice()">🔊</button>
            </div>
          </div>
        </div>

        <!-- ── Side Panel ── -->
        <div class="side-panel">

          <!-- Session Timer -->
          <div class="panel-card" style="padding: 10px 14px;">
            <div style="display:flex; align-items:center; justify-content:space-between;">
              <div class="panel-card-title" style="margin:0">세션 시간</div>
              <div class="session-timer" id="sessionTimer">00:00</div>
            </div>
          </div>

          <!-- Exercise Detection -->
          <div class="panel-card exercise-card">
            <div class="panel-card-title">감지된 운동</div>
            <div class="detected-exercise-name" id="detectedExercise">대기 중...</div>
            <div class="confidence-row">
              <span class="confidence-label">인식률</span>
              <div class="confidence-bar-track">
                <div class="confidence-bar-fill" id="confidenceBar" style="width:0%"></div>
              </div>
              <span class="mono" id="exerciseConfidence" style="font-size:11px; color:var(--text-dim)">0%</span>
            </div>
          </div>

          <!-- Rep Counter -->
          <div class="panel-card rep-counter-card">
            <div class="panel-card-title">반복 횟수</div>
            <div class="rep-big-number" id="repCounter">0</div>
            <div class="rep-sub-row">
              <div class="rep-sub-item">
                <div class="rep-sub-value" id="setCounter">0</div>
                <div class="rep-sub-label">세트</div>
              </div>
              <div class="rep-sub-item">
                <div class="rep-sub-value" id="repQuality" style="color:var(--text-dim)">--</div>
                <div class="rep-sub-label">품질</div>
              </div>
              <div class="rep-sub-item">
                <div class="rep-sub-value" id="fatigueIndicator" style="color:var(--neon-green)">양호</div>
                <div class="rep-sub-label">피로도</div>
              </div>
            </div>
          </div>

          <!-- Form Score -->
          <div class="panel-card form-score-card">
            <div class="panel-card-title">자세 점수</div>
            <div class="score-main-row">
              <div class="score-number" id="formScore">--</div>
              <div class="score-grade" id="formGrade">--</div>
            </div>
            <div class="score-gauge-track">
              <div class="score-gauge-fill" id="scoreGauge" style="width:0%"></div>
            </div>

            <!-- Score Components -->
            <div class="score-components">
              <div class="score-component-row">
                <span class="score-component-label">자세</span>
                <div class="score-component-track"><div class="score-component-bar" id="score-posture" style="width:0%"></div></div>
                <span class="score-component-val" id="val-posture">--</span>
              </div>
              <div class="score-component-row">
                <span class="score-component-label">가동범위</span>
                <div class="score-component-track"><div class="score-component-bar" id="score-rangeOfMotion" style="width:0%; background:var(--neon-purple)"></div></div>
                <span class="score-component-val" id="val-rom">--</span>
              </div>
              <div class="score-component-row">
                <span class="score-component-label">안정성</span>
                <div class="score-component-track"><div class="score-component-bar" id="score-stability" style="width:0%; background:var(--neon-gold)"></div></div>
                <span class="score-component-val" id="val-stability">--</span>
              </div>
              <div class="score-component-row">
                <span class="score-component-label">대칭</span>
                <div class="score-component-track"><div class="score-component-bar" id="score-symmetry" style="width:0%; background:#ff6eb4"></div></div>
                <span class="score-component-val" id="val-symmetry">--</span>
              </div>
              <div class="score-component-row">
                <span class="score-component-label">템포</span>
                <div class="score-component-track"><div class="score-component-bar" id="score-tempo" style="width:0%; background:var(--neon-orange)"></div></div>
                <span class="score-component-val" id="val-tempo">--</span>
              </div>
            </div>
          </div>

          <!-- Risk Assessment -->
          <div class="panel-card risk-card">
            <div class="panel-card-title">부상 위험도</div>
            <div class="safety-main">
              <div class="safety-label" id="safetyScore">안전</div>
              <span class="mono" style="font-size:11px; color:var(--text-dim)" id="riskLevel">위험 없음</span>
            </div>
            <div class="safety-gauge-track">
              <div class="safety-gauge-fill" id="safetyGauge"></div>
            </div>
            <div id="riskWarnings" style="margin-top:8px; font-size:12px; color:var(--neon-orange); min-height:16px;"></div>
          </div>

          <!-- Controls -->
          <div class="controls-card">
            <div class="panel-card-title" style="margin-bottom:10px">제어</div>

            <!-- Weight Input -->
            <div class="weight-input-group">
              <label>무게</label>
              <input type="number" class="weight-input" id="weightInput" value="0" min="0" max="500" step="2.5" />
              <span class="weight-unit">kg</span>
            </div>

            <div class="controls-grid">
              <!-- Start / Stop -->
              <button class="btn btn-primary btn-full" id="btnStart" onclick="app?.startWorkout()">
                ▶ 운동 시작
              </button>
              <button class="btn btn-danger btn-full hidden" id="btnStop" onclick="app?.stopWorkout()">
                ⏸ 일시 정지
              </button>

              <!-- Set & Rep controls -->
              <div id="workoutControls" class="hidden" style="display:contents">
                <button class="btn btn-success" id="btnCompleteSet" onclick="app?.completeCurrentSet()" title="스페이스바">
                  ✓ 세트 완료
                </button>
                <button class="btn btn-neutral" onclick="app?.resetReps()" title="R키">
                  ↺ 횟수 초기화
                </button>
                <button class="btn btn-danger btn-full" id="btnEndSession" onclick="app?.endSession()">
                  ■ 세션 종료
                </button>
              </div>
            </div>

            <!-- Keyboard shortcuts hint -->
            <div style="margin-top:10px; font-size:10px; color:var(--text-dim); font-family:var(--font-mono); line-height:1.8;">
              <span style="color:var(--neon-cyan)">SPACE</span> 세트완료 &nbsp;
              <span style="color:var(--neon-cyan)">R</span> 횟수초기화 &nbsp;
              <span style="color:var(--neon-cyan)">V</span> 음성토글
            </div>
          </div>

          <!-- AI Coach Chat (compact) -->
          <div class="panel-card" id="aiCoachCard">
            <div class="panel-card-title">AI 코치</div>
            <div id="aiCoachMessages" style="font-size:12px; color:var(--text-mid); min-height:36px; line-height:1.6;">
              운동을 시작하면 실시간 코칭이 시작됩니다.
            </div>
          </div>

        </div>
        <!-- /side-panel -->

      </div>
      <!-- /workout-layout -->
    </div>
    <!-- /workoutView -->


    <!-- ═══════════════════════════
         DASHBOARD VIEW
    ════════════════════════════ -->
    <div id="dashboardView" class="dashboard-view hidden">
      <div class="dashboard-header">
        <h2 class="dashboard-title">운동 기록</h2>
        <button class="btn btn-neutral" onclick="app?.showWorkout()" style="padding:6px 14px; font-size:11px;">
          ← 운동으로 돌아가기
        </button>
      </div>

      <div id="dashboardContainer">
        <div class="loading">
          <div class="spinner"></div>
          <span style="color:var(--text-dim); font-family:var(--font-mono); font-size:12px;">데이터 로드 중...</span>
        </div>
      </div>
    </div>

  </main>
</div><!-- /app-container -->

<!-- Scripts (order matters) -->
<script src="poseEngine.js"></script>
<script src="exerciseRecognition.js"></script>
<script src="biomechanicsEngine.js"></script>
<script src="riskEngine.js"></script>
<script src="dashboard.js"></script>
<script src="app.js"></script>

<!-- UI enhancement patches applied after app loads -->
<script>
/**
 * UI 패치: app.js의 _updateRealTimeUI를 확장하여
 * 세부 점수 수치 및 인식률 바 업데이트 포함
 */
document.addEventListener('DOMContentLoaded', () => {
  // app 초기화 완료 후 패치 적용
  const patchInterval = setInterval(() => {
    if (!window.app) return;
    clearInterval(patchInterval);

    const origUpdateUI = window.app._updateRealTimeUI.bind(window.app);

    window.app._updateRealTimeUI = function(formScore, riskAssessment, detection) {
      origUpdateUI(formScore, riskAssessment, detection);

      // ── 세부 점수 수치 업데이트 ──
      if (formScore && formScore.components) {
        const c = formScore.components;
        const map = {
          'val-posture':    c.posture,
          'val-rom':        c.rangeOfMotion,
          'val-stability':  c.stability,
          'val-symmetry':   c.symmetry,
          'val-tempo':      c.tempo
        };
        Object.entries(map).forEach(([id, val]) => {
          const el = document.getElementById(id);
          if (el) el.textContent = val != null ? val : '--';
        });
      }

      // ── 인식률 바 업데이트 ──
      if (detection) {
        const bar = document.getElementById('confidenceBar');
        if (bar) bar.style.width = Math.round((detection.confidence || 0) * 100) + '%';
      }

      // ── 카메라 상태 도트 ──
      const dot  = document.getElementById('cameraStatusDot');
      const txt  = document.getElementById('cameraStatusText');
      if (dot && txt) {
        if (window.app.state.isRunning) {
          dot.classList.add('active');
          txt.textContent = 'LIVE';
        } else {
          dot.classList.remove('active');
          txt.textContent = 'STANDBY';
        }
      }

      // ── 위험 경고 텍스트 ──
      if (riskAssessment && riskAssessment.risks.length > 0) {
        const topRisk = riskAssessment.risks[0];
        const warnEl = document.getElementById('riskWarnings');
        if (warnEl) warnEl.textContent = topRisk.message || '';
      } else {
        const warnEl = document.getElementById('riskWarnings');
        if (warnEl) warnEl.textContent = '';
      }

      // ── AI 코치 메시지 ──
      if (formScore && formScore.feedback && formScore.feedback.length > 0) {
        const coachEl = document.getElementById('aiCoachMessages');
        if (coachEl) {
          coachEl.textContent = formScore.feedback[0].message;
          coachEl.style.color = formScore.feedback[0].type === 'error'
            ? 'var(--neon-red)' : formScore.feedback[0].type === 'warning'
            ? 'var(--neon-orange)' : 'var(--text-mid)';
        }
      } else if (formScore && formScore.total >= 85) {
        const coachEl = document.getElementById('aiCoachMessages');
        if (coachEl) {
          coachEl.textContent = '✓ 자세가 안정적입니다. 계속 유지하세요!';
          coachEl.style.color = 'var(--neon-green)';
        }
      }
    };

    // ── 대시보드 nav 버튼 active 상태 동기화 ──
    const origShowDash = window.app.showDashboard.bind(window.app);
    const origShowWork = window.app.showWorkout.bind(window.app);

    window.app.showDashboard = async function() {
      await origShowDash();
      document.getElementById('btnDashboard')?.classList.add('active');
      document.getElementById('btnWorkout')?.classList.remove('active');
    };

    window.app.showWorkout = function() {
      origShowWork();
      document.getElementById('btnWorkout')?.classList.add('active');
      document.getElementById('btnDashboard')?.classList.remove('active');
    };

  }, 200);
});
</script>

</body>
</html>
